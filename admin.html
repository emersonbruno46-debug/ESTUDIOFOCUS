<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FOCUS | Painel Administrativo de Agendamentos</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-dark: #070a0f;
      --bg-card: rgba(13, 20, 30, 0.45);
      --border-color: rgba(255, 255, 255, 0.06);
      --color-brand: #0088ff;
      --color-brand-dark: #0055ff;
      --color-brand-glow: rgba(0, 136, 255, 0.3);
      --color-text-primary: #ffffff;
      --color-text-secondary: #94a3b8;
      --color-success: #10b981;
      --color-error: #ef4444;
      --color-warning: #f59e0b;
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --transition-fast: 0.15s ease;
      --transition-normal: 0.25s ease;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      background-color: var(--bg-dark);
      color: var(--color-text-primary);
      font-family: 'Plus Jakarta Sans', sans-serif;
      line-height: 1.6;
      overflow-x: hidden;
      width: 100%;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .page-wrapper {
      width: 100%;
      position: relative;
      overflow: hidden;
      min-height: 100vh;
      padding-bottom: 60px;
    }

    .glow-bg {
      position: absolute;
      top: -10%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0, 136, 255, 0.06) 0%, rgba(0, 0, 0, 0) 70%);
      pointer-events: none;
      z-index: -1;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      width: 100%;
    }

    @media (max-width: 600px) {
      .container {
        padding: 0 16px;
      }
    }

    /* HEADER */
    header {
      width: 100%;
      border-bottom: 1px solid var(--border-color);
      background: rgba(7, 10, 15, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-container {
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-container img {
      height: 32px;
    }

    .logo-title {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
      letter-spacing: 0.05em;
    }

    .logo-title span {
      color: var(--color-brand);
    }

    .logout-btn {
      padding: 8px 16px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: var(--radius-sm);
      color: var(--color-error);
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .logout-btn:hover {
      background: var(--color-error);
      color: white;
    }

    /* AUTH SCREEN */
    .auth-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg-dark);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .auth-card {
      width: 100%;
      max-width: 400px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 32px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
      text-align: center;
    }

    .auth-card h2 {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 1.8rem;
      margin-bottom: 8px;
    }

    .auth-card p {
      font-size: 0.9rem;
      color: var(--color-text-secondary);
      margin-bottom: 24px;
    }

    .auth-form input {
      width: 100%;
      height: 50px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      padding: 0 16px;
      color: white;
      font-size: 1rem;
      text-align: center;
      letter-spacing: 0.2em;
      margin-bottom: 16px;
      transition: all var(--transition-fast);
    }

    .auth-form input:focus {
      outline: none;
      border-color: var(--color-brand);
      box-shadow: 0 0 15px rgba(0, 136, 255, 0.1);
    }

    .auth-form button {
      width: 100%;
      height: 50px;
      background: linear-gradient(135deg, var(--color-brand) 0%, var(--color-brand-dark) 100%);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all var(--transition-normal);
    }

    .auth-form button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 136, 255, 0.35);
    }

    /* DASHBOARD CONTENT */
    .dashboard-header {
      margin-top: 40px;
      margin-bottom: 30px;
    }

    .dashboard-header h1 {
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      font-size: 2.2rem;
      letter-spacing: -0.02em;
    }

    @media (max-width: 600px) {
      .dashboard-header {
        margin-top: 24px;
        margin-bottom: 20px;
      }
      .dashboard-header h1 {
        font-size: 1.7rem;
      }
    }

    /* STATS ROW */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 32px;
    }

    @media (max-width: 768px) {
      .stats-row {
        grid-template-columns: 1fr;
        gap: 12px;
      }
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 20px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .stat-label {
      font-size: 0.8rem;
      color: var(--color-text-secondary);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stat-value {
      font-family: 'Outfit', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      margin-top: 4px;
    }

    .stat-value span {
      color: var(--color-brand);
    }

    /* MAIN PANEL GRID */
    .panel-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 24px;
    }

    /* DAY SELECTOR CAROUSEL */
    .day-selector-wrapper {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 24px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    @media (max-width: 600px) {
      .day-selector-wrapper {
        padding: 16px 12px;
      }
    }

    .days-carousel {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 12px;
      scroll-snap-type: x mandatory;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.15) var(--bg-dark);
    }

    .days-carousel::after {
      content: '';
      flex: 0 0 12px;
    }

    .day-card {
      flex: 0 0 calc(14.28% - 10px);
      min-width: 90px;
      padding: 14px 8px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      text-align: center;
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    @media (max-width: 768px) {
      .day-card {
        flex: 0 0 calc(33.33% - 8px);
      }
    }

    .day-card:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .day-card.active {
      background: linear-gradient(135deg, var(--color-brand) 0%, var(--color-brand-dark) 100%);
      border-color: var(--color-brand);
      box-shadow: 0 8px 25px rgba(0, 136, 255, 0.25);
    }

    .day-weekday {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--color-text-secondary);
      text-transform: uppercase;
    }

    .day-card.active .day-weekday {
      color: rgba(255, 255, 255, 0.8);
    }

    .day-number {
      font-family: 'Outfit', sans-serif;
      font-size: 1.6rem;
      font-weight: 900;
      margin-top: 4px;
    }

    .day-month {
      font-size: 0.7rem;
      color: var(--color-text-secondary);
      margin-top: 2px;
    }

    .day-card.active .day-month {
      color: rgba(255, 255, 255, 0.8);
    }

    .day-badge {
      display: inline-block;
      margin-top: 8px;
      padding: 2px 8px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.05);
      font-size: 0.65rem;
      font-weight: 700;
    }

    .day-card.active .day-badge {
      background: rgba(0, 0, 0, 0.25);
      color: white;
    }

    /* HOUR SLOTS GRID */
    .hours-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      margin-top: 32px;
    }

    @media (max-width: 600px) {
      .hours-grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }
    }

    .hour-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: border-color var(--transition-fast);
    }

    .hour-card.full {
      border-color: rgba(239, 68, 68, 0.15);
      background: rgba(239, 68, 68, 0.02);
    }

    .hour-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .hour-time {
      font-family: 'Outfit', sans-serif;
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--color-text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .hour-time svg {
      width: 18px;
      height: 18px;
      color: var(--color-brand);
    }

    .hour-occupancy {
      font-size: 0.75rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      color: white;
    }

    .occupancy-free {
      background: rgba(16, 185, 129, 0.15);
      color: var(--color-success);
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .occupancy-warning {
      background: rgba(245, 158, 11, 0.15);
      color: var(--color-warning);
      border: 1px solid rgba(245, 158, 11, 0.2);
    }

    .occupancy-full {
      background: rgba(239, 68, 68, 0.15);
      color: var(--color-error);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    /* CAPACITY PROGRESS BAR */
    .capacity-container {
      width: 100%;
    }

    .capacity-bar-bg {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 6px;
    }

    .capacity-bar {
      height: 100%;
      border-radius: 3px;
      transition: width 0.4s ease;
    }

    /* STUDENTS LIST */
    .students-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 190px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .student-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      transition: all var(--transition-fast);
    }

    .student-item:hover {
      border-color: rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.03);
    }

    .student-info {
      min-width: 0;
      flex: 1;
    }

    .student-name {
      font-weight: 700;
      color: white;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .student-phone {
      font-size: 0.75rem;
      color: var(--color-text-secondary);
      margin-top: 2px;
    }

    .student-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-left: 12px;
    }

    .action-btn {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      border: 1px solid var(--border-color);
      background: rgba(255, 255, 255, 0.02);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--color-text-secondary);
      transition: all var(--transition-fast);
    }

    .action-btn.whatsapp:hover {
      background: rgba(16, 185, 129, 0.1);
      color: var(--color-success);
      border-color: rgba(16, 185, 129, 0.2);
    }

    .action-btn.delete:hover {
      background: rgba(239, 68, 68, 0.1);
      color: var(--color-error);
      border-color: rgba(239, 68, 68, 0.2);
    }

    .action-btn svg {
      width: 14px;
      height: 14px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .empty-students {
      text-align: center;
      padding: 20px 0;
      font-size: 0.8rem;
      color: var(--color-text-secondary);
      font-style: italic;
    }

    /* TOAST NOTIFICATION */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: rgba(13, 20, 30, 0.9);
      border: 1px solid var(--border-color);
      border-left: 4px solid var(--color-brand);
      padding: 16px 24px;
      border-radius: var(--radius-sm);
      color: white;
      font-weight: 600;
      font-size: 0.9rem;
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
      z-index: 2000;
      transform: translateY(150px);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      backdrop-filter: blur(12px);
    }

    .toast.show {
      transform: translateY(0);
    }

    .toast.success {
      border-left-color: var(--color-success);
    }

    .toast.error {
      border-left-color: var(--color-error);
    }
  </style>
</head>

    // STATE
    let allAppointments = [];
    let datesList = [];
    let selectedDateStr = "";

    // AUTH CHECK
    window.addEventListener('DOMContentLoaded', () => {
      if (sessionStorage.getItem('focus_admin_auth') === 'true') {
        hideAuthScreen();
        initDashboard();
      }
    });

    function handleLogin(event) {
      event.preventDefault();
      const code = document.getElementById('passcode').value;
      if (code === AUTH_PASSCODE) {
        sessionStorage.setItem('focus_admin_auth', 'true');
        hideAuthScreen();
        initDashboard();
        showToast("Bem-vindo de volta, Maison!", "success");
      } else {
        showToast("Senha de administrador incorreta!", "error");
        document.getElementById('passcode').value = "";
      }
    }

    function handleLogout() {
      sessionStorage.removeItem('focus_admin_auth');
      window.location.reload();
    }

    function hideAuthScreen() {
      document.getElementById('authOverlay').style.display = 'none';
    }

    // DASHBOARD INITIALIZATION
    async function initDashboard() {
      generateDates();
      renderDays();
      await fetchAppointments();
      
      // Select first day by default
      if (datesList.length > 0) {
        selectDay(0);
      }
      
      // Setup real-time updates via Supabase Channel
      supabaseClient
        .channel('focus_admin_changes')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'focus_appointments' }, async () => {
          await fetchAppointments();
          updateUI();
        })
        .subscribe();
    }

    // GENERATE DAYS (Identical to landing page, skip Sundays)
    function generateDates() {
      const daysOfWeek = ["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sáb"];
      const monthsOfYear = [
        "Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho",
        "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"
      ];
      
      const today = new Date();
      datesList = [];
      
      for (let i = 0; i < 7; i++) {
        const nextDate = new Date();
        nextDate.setDate(today.getDate() + i);
        
        if (nextDate.getDay() === 0) {
          today.setDate(today.getDate() + 1);
          i--;
          continue;
        }

        datesList.push({
          dateObj: nextDate,
          dayNum: nextDate.getDate(),
          weekdayStr: daysOfWeek[nextDate.getDay()],
          monthStr: monthsOfYear[nextDate.getMonth()].slice(0, 3),
          fullDateStr: nextDate.toLocaleDateString('pt-BR'),
          readableDate: `${daysOfWeek[nextDate.getDay()]}, ${nextDate.getDate()} de ${monthsOfYear[nextDate.getMonth()]}`
        });
      }
    }

    // FETCH FROM SUPABASE
    async function fetchAppointments() {
      try {
        const { data, error } = await supabaseClient
          .from('focus_appointments')
          .select('*')
          .order('created_at', { ascending: false });
          
        if (error) throw error;
        allAppointments = data || [];
        updateStats();
      } catch (err) {
        console.error("Erro ao carregar dados:", err);
        showToast("Falha ao sincronizar com o banco de dados.", "error");
      }
    }

    // STATS UPDATE
    function updateStats() {
      let totalDisplayCount = 0;
      datesList.forEach(d => {
        const weekdayIdx = d.dateObj.getDay();
        let fixedTotalForDay = 0;
        AVAILABLE_SLOTS.forEach(slot => {
          const fixedForSlot = fixedClients[slot] || [];
          fixedTotalForDay += fixedForSlot.filter(c => c.days.includes(weekdayIdx)).length;
        });
        const dbCount = allAppointments.filter(app => app.booking_date === d.fullDateStr).length;
        totalDisplayCount += fixedTotalForDay + dbCount;
      });
      document.getElementById('statTotal').innerText = totalDisplayCount;
      
      // Calculate today's count
      const todayStr = new Date().toLocaleDateString('pt-BR');
      const todayObj = datesList.find(d => d.fullDateStr === todayStr);
      let todayCount = 0;
      if (todayObj) {
        const weekdayIdx = todayObj.dateObj.getDay();
        let fixedTotalForToday = 0;
        AVAILABLE_SLOTS.forEach(slot => {
          const fixedForSlot = fixedClients[slot] || [];
          fixedTotalForToday += fixedForSlot.filter(c => c.days.includes(weekdayIdx)).length;
        });
        const dbCount = allAppointments.filter(app => app.booking_date === todayStr).length;
        todayCount = fixedTotalForToday + dbCount;
      } else {
        todayCount = allAppointments.filter(app => app.booking_date === todayStr).length;
      }
      document.getElementById('statToday').innerText = todayCount;
    }

    // RENDER CAROUSEL DAYS
    function renderDays() {
      const container = document.getElementById('daysCarousel');
      container.innerHTML = "";
      
      datesList.forEach((d, idx) => {
        const card = document.createElement('div');
        card.className = `day-card`;
        card.id = `dayCard-${idx}`;
        card.onclick = () => selectDay(idx);
        
        card.innerHTML = `
          <div class="day-weekday">${d.weekdayStr}</div>
          <div class="day-number">${d.dayNum}</div>
          <div class="day-month">${d.monthStr}</div>
          <span class="day-badge" id="dayBadge-${d.fullDateStr}">0 agend.</span>
        `;
        
        container.appendChild(card);
      });
    }

    // SELECT DAY
    function selectDay(index) {
      document.querySelectorAll('.day-card').forEach(c => c.classList.remove('active'));
      const card = document.getElementById(`dayCard-${index}`);
      if (card) card.classList.add('active');
      
      selectedDateStr = datesList[index].fullDateStr;
      
      const readable = datesList[index].readableDate;
      document.getElementById('gridHeaderTitle').innerText = `Horários de ${readable}`;
      
      updateUI();
    }

    // UPDATE UI VIEW
    function updateUI() {
      // Update day badges counts
      datesList.forEach(d => {
        const badge = document.getElementById(`dayBadge-${d.fullDateStr}`);
        if (badge) {
          const weekdayIdx = d.dateObj.getDay();
          let fixedTotalForDay = 0;
          AVAILABLE_SLOTS.forEach(slot => {
            const fixedForSlot = fixedClients[slot] || [];
            fixedTotalForDay += fixedForSlot.filter(c => c.days.includes(weekdayIdx)).length;
          });
          const dbCount = allAppointments.filter(app => app.booking_date === d.fullDateStr).length;
          badge.innerText = `${fixedTotalForDay + dbCount} agend.`;
        }
      });

      // Filter and render hour slots for selected date
      const grid = document.getElementById('hoursGrid');
      grid.innerHTML = "";

      const dayApps = allAppointments.filter(app => app.booking_date === selectedDateStr);
      const currentDayObj = datesList.find(d => d.fullDateStr === selectedDateStr);
      const weekdayIdx = currentDayObj ? currentDayObj.dateObj.getDay() : new Date().getDay();

      AVAILABLE_SLOTS.forEach(slot => {
        const slotApps = dayApps.filter(app => app.booking_time === slot);
        
        // Fixed clients for this slot on this weekday
        const fixedForSlot = fixedClients[slot] || [];
        const fixedOnThisDay = fixedForSlot.filter(c => c.days.includes(weekdayIdx));
        
        const occupancy = slotApps.length + fixedOnThisDay.length;
        const isFull = occupancy >= 7;

        let statusClass = "occupancy-free";
        let statusText = "Disponível";
        let barColor = "var(--color-brand)";
        let cardClass = "";

        if (isFull) {
          statusClass = "occupancy-full";
          statusText = "Lotado";
          barColor = "var(--color-error)";
          cardClass = "full";
        } else if (occupancy >= 5) {
          statusClass = "occupancy-warning";
          statusText = "Poucas Vagas";
          barColor = "var(--color-warning)";
        }

        const hourCard = document.createElement('div');
        hourCard.className = `hour-card ${cardClass}`;
        
        let studentsHtml = "";
        if (occupancy === 0) {
          studentsHtml = `<div class="empty-students">Nenhum aluno agendado</div>`;
        } else {
          // Render fixed clients first
          fixedOnThisDay.forEach(client => {
            const rawPhone = client.phone.replace(/\D/g, "");
            const formattedPhone = rawPhone.startsWith("55") ? rawPhone : (rawPhone ? `55${rawPhone}` : "");
            
            let waBtnHtml = "";
            if (formattedPhone) {
              const waText = `Olá ${client.name}! Estou entrando em contato sobre o seu treino na FOCUS no horário de ${slot}.`;
              const waUrl = `https://wa.me/${formattedPhone}?text=${encodeURIComponent(waText)}`;
              waBtnHtml = `
                <a href="${waUrl}" target="_blank" class="action-btn whatsapp" title="Enviar WhatsApp">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                </a>
              `;
            }
            
            // Format phone for display
            let displayPhone = client.phone;
            if (rawPhone.length === 11) {
              displayPhone = `(${rawPhone.slice(0, 2)}) ${rawPhone.slice(2, 7)}-${rawPhone.slice(7)}`;
            } else if (rawPhone.length === 10) {
              displayPhone = `(${rawPhone.slice(0, 2)}) ${rawPhone.slice(2, 6)}-${rawPhone.slice(6)}`;
            } else if (!client.phone) {
              displayPhone = "Sem telefone";
            }

            studentsHtml += `
              <div class="student-item" style="border-left: 3px solid var(--color-brand)">
                <div class="student-info">
                  <div class="student-name" title="${client.name} (Fixo)">
                    ${client.name} <span style="font-size: 0.65rem; background: rgba(0, 136, 255, 0.15); color: var(--color-brand); padding: 1px 6px; border-radius: 4px; margin-left: 6px; font-weight: 800;">FIXO</span>
                  </div>
                  <div class="student-phone">${displayPhone}</div>
                </div>
                <div class="student-actions">
                  ${waBtnHtml}
                </div>
              </div>
            `;
          });

          // Render database clients next
          slotApps.forEach(app => {
            const rawPhone = app.client_phone.replace(/\D/g, "");
            const formattedPhone = rawPhone.startsWith("55") ? rawPhone : `55${rawPhone}`;
            const waText = `Olá ${app.client_name}! Estou entrando em contato sobre o seu treino agendado na FOCUS no dia ${app.booking_date} às ${app.booking_time}.`;
            const waUrl = `https://wa.me/${formattedPhone}?text=${encodeURIComponent(waText)}`;
            
            studentsHtml += `
              <div class="student-item">
                <div class="student-info">
                  <div class="student-name" title="${app.client_name}">${app.client_name}</div>
                  <div class="student-phone">${app.client_phone}</div>
                </div>
                <div class="student-actions">
                  <a href="${waUrl}" target="_blank" class="action-btn whatsapp" title="Enviar WhatsApp">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                  </a>
                  <button class="action-btn delete" onclick="deleteAppointment('${app.id}')" title="Cancelar Agendamento">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                  </button>
                </div>
              </div>
            `;
          });
        }

        hourCard.innerHTML = `
          <div class="hour-card-header">
            <div class="hour-time">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
              <span>${slot.replace(" - ", " às ")}</span>
            </div>
            <span class="hour-occupancy ${statusClass}">${statusText}</span>
          </div>

          <div class="capacity-container">
            <div class="capacity-bar-bg">
              <div class="capacity-bar" style="width: ${Math.min(100, (occupancy / 7) * 100)}%; background-color: ${barColor};"></div>
            </div>
            <div style="display:flex; justify-content:space-between; font-size:0.7rem; color:var(--color-text-secondary); margin-top:6px;">
              <span>Ocupação</span>
              <span style="font-weight:700; color:white;">${occupancy} / 7 alunos</span>
            </div>
          </div>

          <div class="students-list">
            ${studentsHtml}
          </div>
        `;

        grid.appendChild(hourCard);
      });
    }

    // DELETE APPOINTMENT ACTION
    async function deleteAppointment(id) {
      if (!confirm("Deseja realmente cancelar e excluir este agendamento de treino?")) return;
      
      try {
        const { error } = await supabaseClient
          .from('focus_appointments')
          .delete()
          .eq('id', id);
          
        if (error) throw error;
        
        // Optimistic UI update
        allAppointments = allAppointments.filter(app => app.id !== id);
        updateStats();
        updateUI();
        showToast("Agendamento cancelado com sucesso!", "success");
      } catch (err) {
        console.error("Erro ao deletar:", err);
        showToast("Erro ao cancelar agendamento. Tente novamente.", "error");
      }
    }

    // TOAST SYSTEM
    function showToast(message, type = "success") {
      const toast = document.getElementById('toast');
      toast.innerText = message;
      toast.className = `toast show ${type}`;
      
      setTimeout(() => {
        toast.classList.remove('show');
      }, 3500);
    }
  </script>
